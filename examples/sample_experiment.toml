[app]
artifacts_dir = ".artifacts"
frontend_dist = "frontend/dist"

[openrouter]
base_url = "https://openrouter.ai/api/v1"
prompt_model = "openai/gpt-4o-mini"
grading_model = "openai/gpt-4o-mini"
http_referer = "http://localhost"
app_name = "auto-tuner"

[generation]
sample_count = 3
meta_prompt = "Improve attribute access style and maintainability by encouraging direct, explicit, readable patterns over dynamic access patterns."

[grading]
max_retries = 2

[training]
backend = "fake"
model_name = "Qwen/Qwen2.5-0.5B-Instruct"
max_seq_length = 2048
load_in_4bit = true
num_train_epochs = 1
per_device_train_batch_size = 2
output_dir = "./output"
lora_rank = 16
learning_rate = 0.0002

[demo]
enabled = true
example_models = ["Qwen/Qwen2.5-0.5B-Instruct", "TinyLlama/TinyLlama-1.1B-Chat-v1.0"]
