app:
  artifacts_dir: ".artifacts"
  frontend_dist: "frontend/dist"

generation:
  sample_count: 3
  meta_prompt: |
    Improve Python code quality by encouraging direct, explicit, readable access patterns over dynamic access patterns.

    Hard rule: do not use Python reflection/introspection-based access patterns such as `getattr(`, `hasattr(`,
    `.__dict__`, or `vars(` in the output.

grading:
  max_retries: 2

training:
  model_name: "unsloth/Llama-3.2-3B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true
  num_train_epochs: 1
  per_device_train_batch_size: 2
  output_dir: "./output"
