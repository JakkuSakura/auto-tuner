app:
  artifacts_dir: ".artifacts"
  frontend_dist: "frontend/dist"

generation:
  sample_count: 3
  meta_prompt_file: "prompts/meta_prompt.md"

grading:
  max_retries: 2

training:
  model_name: "unsloth/Llama-3.2-3B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true
  num_train_epochs: 1
  per_device_train_batch_size: 2
  output_dir: "./output"
