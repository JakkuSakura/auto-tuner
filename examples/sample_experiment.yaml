app:
  artifacts_dir: ".artifacts"
  frontend_dist: "frontend/dist"

openrouter:
  base_url: "https://openrouter.ai/api/v1"
  prompt_model: "z-ai/glm-5"
  grading_model: "z-ai/glm-5"
  http_referer: "http://localhost"
  app_name: "auto-tuner"

generation:
  sample_count: 3
  meta_prompt: |
    Focus on one coding-quality aspect: prefer direct, explicit, readable attribute access (e.g. `obj.value`) over
    reflection/introspection patterns (e.g. `getattr`, `hasattr`, `vars`, `__dict__`).

    When selection is required, use an explicit mapping/registry or typed protocol instead of dynamic lookup.

    Do not include or mention any specific code snippet from the user’s codebase.

    Hard rule: do not use Python reflection/introspection-based access patterns such as `getattr(`, `hasattr(`,
    `.__dict__`, or `vars(` in the output.

grading:
  max_retries: 2
  max_passes: 3
  pass_score: 100

training:
  method: "sft"
  model_name: "Qwen/Qwen2.5-0.5B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true
  num_train_epochs: 1
  per_device_train_batch_size: 2
  output_dir: "./output"
  lora_rank: 16
  learning_rate: 0.0002
